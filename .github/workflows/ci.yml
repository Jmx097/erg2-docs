name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: openclaw
          POSTGRES_USER: openclaw
          POSTGRES_PASSWORD: openclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openclaw -d openclaw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://openclaw:openclaw@127.0.0.1:5432/openclaw

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build
